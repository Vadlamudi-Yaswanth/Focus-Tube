<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusTube | Stable Version</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Focus<span>Tube</span></h1>
        <p>AI-Filtered Educational Content</p>
        
        <div class="search-box">
            <input type="text" id="userQuery" placeholder="Enter topic (e.g., Data Structures)">
            <button id="searchBtn">Search</button>
        </div>

        <div id="status"></div>
        <div id="videoResults" class="results-grid"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
